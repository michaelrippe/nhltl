<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NHL Team League</title>
      <style>
                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                }

                body {
                              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                              background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                              color: #ecf0f1;
                              min-height: 100vh;
                              padding: 20px;
                }

                .container {
                              max-width: 1200px;
                              margin: 0 auto;
                }

                header {
                              text-align: center;
                              margin-bottom: 40px;
                              border-bottom: 3px solid #e74c3c;
                              padding-bottom: 20px;
                }

                h1 {
                              font-size: 3em;
                              color: #ecf0f1;
                              text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
                              margin-bottom: 10px;
                              letter-spacing: 2px;
                }

                .subtitle {
                              color: #3498db;
                              font-size: 1.2em;
                              margin-bottom: 20px;
                }

                .controls {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                              gap: 20px;
                              margin-bottom: 40px;
                }

                .control-section {
                              background: rgba(52, 73, 94, 0.8);
                              padding: 20px;
                              border-radius: 8px;
                              border-left: 4px solid #3498db;
                }

                .control-section h2 {
                              color: #3498db;
                              margin-bottom: 15px;
                              font-size: 1.2em;
                }

                input, select {
                              width: 100%;
                              padding: 12px;
                              margin-bottom: 10px;
                              border: 2px solid #34495e;
                              border-radius: 4px;
                              background: #2c3e50;
                              color: #ecf0f1;
                              font-size: 1em;
                }

                input:focus, select:focus {
                              outline: none;
                              border-color: #3498db;
                              box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
                }

                button {
                              width: 100%;
                              padding: 12px;
                              background: #e74c3c;
                              color: white;
                              border: none;
                              border-radius: 4px;
                              font-size: 1em;
                              font-weight: bold;
                              cursor: pointer;
                              transition: all 0.3s ease;
                }

                button:hover {
                              background: #c0392b;
                              transform: translateY(-2px);
                              box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
                }

                .leaderboard {
                              background: rgba(52, 73, 94, 0.8);
                              padding: 30px;
                              border-radius: 8px;
                              border: 2px solid #3498db;
                }

                .leaderboard h2 {
                              color: #3498db;
                              margin-bottom: 20px;
                              font-size: 1.5em;
                              text-align: center;
                }

                table {
                              width: 100%;
                              border-collapse: collapse;
                }

                thead {
                              background: linear-gradient(90deg, #34495e, #2c3e50);
                              border-bottom: 3px solid #3498db;
                }

                th {
                              padding: 15px;
                              text-align: left;
                              color: #3498db;
                              font-weight: bold;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                }

                td {
                              padding: 15px;
                              border-bottom: 1px solid #34495e;
                }

                tr:hover {
                              background: rgba(52, 152, 219, 0.1);
                }

                tr:nth-child(even) {
                              background: rgba(0, 0, 0, 0.2);
                }

                .rank {
                              font-weight: bold;
                              color: #e74c3c;
                              font-size: 1.2em;
                }

                .rank-1 {
                              color: #f39c12;
                }

                .rank-2 {
                              color: #95a5a6;
                }

                .rank-3 {
                              color: #d4a574;
                }

                .wins {
                              color: #2ecc71;
                              font-weight: bold;
                              font-size: 1.1em;
                }

                .no-data {
                              text-align: center;
                              padding: 40px;
                              color: #7f8c8d;
                              font-size: 1.1em;
                }

                .delete-btn {
                              background: #e67e22;
                              padding: 6px 12px;
                              font-size: 0.85em;
                              width: auto;
                }

                .delete-btn:hover {
                              background: #d35400;
                }

                .stats-summary {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                              gap: 15px;
                              margin-bottom: 30px;
                }

                .stat-card {
                              background: linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(41, 128, 185, 0.2));
                              padding: 20px;
                              border-radius: 8px;
                              border-left: 4px solid #3498db;
                              text-align: center;
                }

                .stat-value {
                              font-size: 2.5em;
                              font-weight: bold;
                              color: #3498db;
                              margin-bottom: 5px;
                }

                .stat-label {
                              color: #95a5a6;
                              font-size: 0.9em;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                }

                .clear-data-btn {
                              background: #95a5a6;
                              margin-top: 20px;
                }

                .clear-data-btn:hover {
                              background: #7f8c8d;
                }

                .notification {
                              position: fixed;
                              top: 20px;
                              right: 20px;
                              background: #2ecc71;
                              color: white;
                              padding: 15px 25px;
                              border-radius: 8px;
                              box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
                              opacity: 0;
                              transform: translateY(-20px);
                              transition: all 0.3s ease;
                              z-index: 1000;
                }

                .notification.show {
                              opacity: 1;
                              transform: translateY(0);
                }

                .notification.error {
                              background: #e74c3c;
                }
            </style>
  </head>
  <body>
        <div id="notification" class="notification"></div>
        <div class="container">
                  <header>
                                <h1>🏒 NHL TEAM LEAGUE</h1>
                              <p class="subtitle">Draft. Compete. Win.</p>
                  </header>

                <div class="stats-summary" id="statsSummary"></div>

                <div class="controls">
                            <div class="control-section">
                                            <h2>Add Player</h2>
                                            <input type="text" id="playerName" placeholder="Player Name" maxlength="50">
                                            <button onclick="addPlayer()">Add Player</button>
                            </div>
                
                            <div class="control-section">
                                            <h2>Draft Team</h2>
                                            <select id="playerSelect">
                                                                <option value="">Select a player...</option>
                                            </select>
                                            <select id="teamSelect">
                                                                <option value="">Select an NHL team...</option>
                                            </select>
                                            <button onclick="draftTeam()">Draft Team</button>
                            </div>
                
                            <div class="control-section">
                                            <h2>Update Wins</h2>
                                            <select id="updatePlayerSelect">
                                                                <option value="">Select a player...</option>
                                            </select>
                                            <input type="number" id="winsInput" placeholder="Team Wins" min="0" max="82">
                                            <button onclick="updateWins()">Update Wins</button>
                            </div>
                </div>
        
                <div class="leaderboard">
                            <h2>Leaderboard</h2>
                            <div id="leaderboardContent"></div>
                            <button class="clear-data-btn" onclick="clearAllData()">Clear All Data</button>
                </div>
        </div>
  
      <script>
                const nhlTeams = [
                              'Anaheim Ducks', 'Arizona Coyotes', 'Boston Bruins', 'Buffalo Sabres',
                              'Calgary Flames', 'Carolina Hurricanes', 'Chicago Blackhawks', 'Colorado Avalanche',
                              'Columbus Blue Jackets', 'Dallas Stars', 'Detroit Red Wings', 'Edmonton Oilers',
                              'Florida Panthers', 'Los Angeles Kings', 'Minnesota Wild', 'Montreal Canadiens',
                              'Nashville Predators', 'New Jersey Devils', 'New York Islanders', 'New York Rangers',
                              'Ottawa Senators', 'Philadelphia Flyers', 'Pittsburgh Penguins', 'San Jose Sharks',
                              'Seattle Kraken', 'St. Louis Blues', 'Tampa Bay Lightning', 'Toronto Maple Leafs',
                              'Vancouver Canucks', 'Vegas Golden Knights', 'Washington Capitals', 'Winnipeg Jets'
                          ];

// Load data from localStorage or use defaults
let players = JSON.parse(localStorage.getItem('tlPlayers')) || [
  {id: '1', name: 'Oilers'},
  {id: '2', name: 'Leafs'},
  {id: '3', name: 'Panthers'},
  {id: '4', name: 'Blues'},
  {id: '5', name: 'Mammoth'},
  {id: '6', name: 'Islanders'},
  {id: '7', name: 'Flyers'},
  {id: '8', name: 'Blackhawks'}
];

let drafts = JSON.parse(localStorage.getItem('tlDrafts')) || [
  {id: '1', playerId: '1', team: 'Hurricanes', wins: 0},
  {id: '2', playerId: '2', team: 'Lightning', wins: 0},
  {id: '3', playerId: '3', team: 'Devils', wins: 0},
  {id: '4', playerId: '4', team: 'Capitals', wins: 0},
  {id: '5', playerId: '5', team: 'Canucks', wins: 0},
  {id: '6', playerId: '6', team: 'Predators', wins: 0},
  {id: '7', playerId: '7', team: 'Wings', wins: 0},
  {id: '8', playerId: '8', team: 'Sharks', wins: 0}
];
                function showNotification(message, isError = false) {
                              const notification = document.getElementById('notification');
                              notification.textContent = message;
                              notification.className = 'notification' + (isError ? ' error' : '');
                              notification.classList.add('show');
                              setTimeout(() => {
                                                notification.classList.remove('show');
                              }, 3000);
                }

                function renderStats() {
                              const statsContainer = document.getElementById('statsSummary');
                              const totalPlayers = players.length;
                              const totalDrafts = drafts.length;
                              const highestWins = drafts.length > 0 ? Math.max(...drafts.map(d => d.wins)) : 0;
                              const availableTeams = nhlTeams.length - drafts.length;

                              statsContainer.innerHTML = `
                                                <div class="stat-card">
                                                                      <div class="stat-value">${totalPlayers}</div>
                                                                      <div class="stat-label">Total Players</div>
                                                </div>
                                                <div class="stat-card">
                                                                      <div class="stat-value">${totalDrafts}</div>
                                                                      <div class="stat-label">Teams Drafted</div>
                                                </div>
                                                <div class="stat-card">
                                                                      <div class="stat-value">${highestWins}</div>
                                                                      <div class="stat-label">Highest Wins</div>
                                                </div>
                                                <div class="stat-card">
                                                                      <div class="stat-value">${availableTeams}</div>
                                                                      <div class="stat-label">Teams Available</div>
                                                </div>
                              `;
                }

                function clearAllData() {
                              if (confirm('Are you sure you want to clear all data? This cannot be undone!')) {
                                                localStorage.removeItem('tlPlayers');
                                                localStorage.removeItem('tlDrafts');
                                                location.reload();
                              }
                }

                function initializeTeamSelect() {
                              const select = document.getElementById('teamSelect');
                              select.innerHTML = '<option value="">Select an NHL team...</option>';
                              const draftedTeams = drafts.map(d => d.team);
                              nhlTeams.forEach(team => {
                                                if (!draftedTeams.includes(team)) {
                                                                      const option = document.createElement('option');
                                                                      option.value = team;
                                                                      option.textContent = team;
                                                                      select.appendChild(option);
                                                }
                              });
                }

                function initializePlayerSelects() {
                              const selects = [
                                                document.getElementById('playerSelect'),
                                                document.getElementById('updatePlayerSelect')
                                            ];

                              selects.forEach(select => {
                                                const currentValue = select.value;
                                                select.innerHTML = '<option value="">Select a player...</option>';
                                                players.forEach(player => {
                                                                      const option = document.createElement('option');
                                                                      option.value = player.id;
                                                                      option.textContent = player.name;
                                                                      select.appendChild(option);
                                                });
                                                select.value = currentValue;
                              });
                }

                function addPlayer() {
                              const name = document.getElementById('playerName').value.trim();
                              if (!name) {
                                                showNotification('Please enter a player name', true);
                                                return;
                              }

                              const newPlayer = {
                                                id: Date.now().toString(),
                                                name: name
                              };

                              players.push(newPlayer);
                              localStorage.setItem('tlPlayers', JSON.stringify(players));
                              document.getElementById('playerName').value = '';
                              initializePlayerSelects();
                              renderLeaderboard();
                              renderStats();
                              showNotification(`Player "${name}" added successfully!`);
                }

                function draftTeam() {
                              const playerId = document.getElementById('playerSelect').value;
                              const team = document.getElementById('teamSelect').value;

                              if (!playerId || !team) {
                                                showNotification('Please select both a player and a team', true);
                                                return;
                              }

                              if (drafts.some(d => d.team === team)) {
                                                showNotification('This team has already been drafted!', true);
                                                return;
                              }

                              if (drafts.some(d => d.playerId === playerId)) {
                                                showNotification('This player has already drafted a team!', true);
                                                return;
                              }

                              const player = players.find(p => p.id === playerId);
                              const draft = {
                                                id: Date.now().toString(),
                                                playerId: playerId,
                                                team: team,
                                                wins: 0
                              };

                              drafts.push(draft);
                              localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                              document.getElementById('playerSelect').value = '';
                              document.getElementById('teamSelect').value = '';
                              initializeTeamSelect();
                              renderLeaderboard();
                              renderStats();
                              showNotification(`${player.name} drafted ${team}!`);
                }

                function updateWins() {
                              const playerId = document.getElementById('updatePlayerSelect').value;
                              const wins = parseInt(document.getElementById('winsInput').value);

                              if (!playerId || isNaN(wins) || wins < 0) {
                                                showNotification('Please select a player and enter valid wins', true);
                                                return;
                              }

                              const draft = drafts.find(d => d.playerId === playerId);
                              if (draft) {
                                                const player = players.find(p => p.id === playerId);
                                                draft.wins = wins;
                                                localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                                                document.getElementById('winsInput').value = '';
                                                renderLeaderboard();
                                                renderStats();
                                                showNotification(`${player.name}'s ${draft.team} updated to ${wins} wins!`);
                              }
                }

                function removeDraft(draftId) {
                              const draft = drafts.find(d => d.id === draftId);
                              const player = players.find(p => p.id === draft.playerId);
                              if (confirm(`Remove ${player.name}'s draft of ${draft.team}?`)) {
                                                drafts = drafts.filter(d => d.id !== draftId);
                                                localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                                                initializeTeamSelect();
                                                renderLeaderboard();
                                                renderStats();
                                                showNotification(`Draft removed successfully!`);
                              }
                }

                function renderLeaderboard() {
                              const content = document.getElementById('leaderboardContent');

                              if (drafts.length === 0) {
                                                content.innerHTML = '<div class="no-data">No drafts yet. Start by adding players and drafting teams!</div>';
                                                return;
                              }

                              const leaderboardData = drafts.map(draft => {
                                                const player = players.find(p => p.id === draft.playerId);
                                                return {
                                                                      ...draft,
                                                                      playerName: player ? player.name : 'Unknown'
                                                };
                              }).sort((a, b) => b.wins - a.wins);

                              let html = '<table><thead><tr><th>Rank</th><th>Player</th><th>Team</th><th>Wins</th><th>Action</th></tr></thead><tbody>';

                              leaderboardData.forEach((item, index) => {
                                                const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                                                html += `
                                                                    <tr>
                                                                                            <td class="rank ${rankClass}">${index + 1}</td>
                                                                                                                    <td>${item.playerName}</td>
                                                                                                                                            <td>${item.team}</td>
                                                                                                                                                                    <td class="wins">${item.wins}</td>
                                                                                                                                                                                            <td><button class="delete-btn" onclick="removeDraft('${item.id}')">Remove</button></td>
                                                                                                                                                                                                                </tr>
                                                                                                                                                                                                                                `;
                              });

                              html += '</tbody></table>';
                              content.innerHTML = html;
                }

                window.addEventListener('load', function() {
                              initializePlayerSelects();
                              initializeTeamSelect();
                              renderLeaderboard();
                              renderStats();
                });
      </script>
  </body>
</html>
