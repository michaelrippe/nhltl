<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NHL Team League</title>
      <style>
                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                }

                body {
                              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                              background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                              color: #ecf0f1;
                              min-height: 100vh;
                              padding: 20px;
                }

                .container {
                              max-width: 1200px;
                              margin: 0 auto;
                }

                header {
                              text-align: center;
                              margin-bottom: 40px;
                              border-bottom: 3px solid #e74c3c;
                              padding-bottom: 20px;
                }

                h1 {
                              font-size: 3em;
                              color: #ecf0f1;
                              text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
                              margin-bottom: 10px;
                              letter-spacing: 2px;
                }

                .subtitle {
                              color: #3498db;
                              font-size: 1.2em;
                              margin-bottom: 20px;
                }

                .controls {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                              gap: 20px;
                              margin-bottom: 40px;
                }

                .control-section {
                              background: rgba(52, 73, 94, 0.8);
                              padding: 20px;
                              border-radius: 8px;
                              border-left: 4px solid #3498db;
                }

                .control-section h2 {
                              color: #3498db;
                              margin-bottom: 15px;
                              font-size: 1.2em;
                }

                input, select {
                              width: 100%;
                              padding: 12px;
                              margin-bottom: 10px;
                              border: 2px solid #34495e;
                              border-radius: 4px;
                              background: #2c3e50;
                              color: #ecf0f1;
                              font-size: 1em;
                }

                input:focus, select:focus {
                              outline: none;
                              border-color: #3498db;
                              box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
                }

                button {
                              width: 100%;
                              padding: 12px;
                              background: #e74c3c;
                              color: white;
                              border: none;
                              border-radius: 4px;
                              font-size: 1em;
                              font-weight: bold;
                              cursor: pointer;
                              transition: all 0.3s ease;
                }

                button:hover {
                              background: #c0392b;
                              transform: translateY(-2px);
                              box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
                }

                .leaderboard {
                              background: rgba(52, 73, 94, 0.8);
                              padding: 30px;
                              border-radius: 8px;
                              border: 2px solid #3498db;
                }

                .leaderboard h2 {
                              color: #3498db;
                              margin-bottom: 20px;
                              font-size: 1.5em;
                              text-align: center;
                }

                table {
                              width: 100%;
                              border-collapse: collapse;
                }

                thead {
                              background: linear-gradient(90deg, #34495e, #2c3e50);
                              border-bottom: 3px solid #3498db;
                }

                th {
                              padding: 15px;
                              text-align: left;
                              color: #3498db;
                              font-weight: bold;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                }

                td {
                              padding: 15px;
                              border-bottom: 1px solid #34495e;
                }

                tr:hover {
                              background: rgba(52, 152, 219, 0.1);
                }

                tr:nth-child(even) {
                              background: rgba(0, 0, 0, 0.2);
                }

                .rank {
                              font-weight: bold;
                              color: #e74c3c;
                              font-size: 1.2em;
                }

                .rank-1 {
                              color: #f39c12;
                }

                .rank-2 {
                              color: #95a5a6;
                }

                .rank-3 {
                              color: #d4a574;
                }

                .wins {
                              color: #2ecc71;
                              font-weight: bold;
                              font-size: 1.1em;
                }

                .no-data {
                              text-align: center;
                              padding: 40px;
                              color: #7f8c8d;
                              font-size: 1.1em;
                }

                .delete-btn {
                              background: #e67e22;
                              padding: 6px 12px;
                              font-size: 0.85em;
                              width: auto;
                }

                .delete-btn:hover {
                              background: #d35400;
                }
            </style>
  </head>
  <body>
        <div class="container">
                  <header>
                                <h1>🏒 NHL TEAM LEAGUE</h1>
                              <p class="subtitle">Draft. Compete. Win.</p>p>
                  </header>
        
                <div class="controls">
                            <div class="control-section">
                                            <h2>Add Player</h2>
                                            <input type="text" id="playerName" placeholder="Player Name" maxlength="50">
                                            <button onclick="addPlayer()">Add Player</button>button>
                            </div>div>
                
                            <div class="control-section">
                                            <h2>Draft Team</h2>
                                            <select id="playerSelect">
                                                                <option value="">Select a player...</option>option>
                                            </select>select>
                                            <select id="teamSelect">
                                                                <option value="">Select an NHL team...</option>option>
                                            </select>select>
                                            <button onclick="draftTeam()">Draft Team</button>button>
                            </div>div>
                
                            <div class="control-section">
                                            <h2>Update Wins</h2>
                                            <select id="updatePlayerSelect">
                                                                <option value="">Select a player...</option>option>
                                            </select>select>
                                            <input type="number" id="winsInput" placeholder="Team Wins" min="0" max="82">
                                            <button onclick="updateWins()">Update Wins</button>button>
                            </div>div>
                </div>div>
        
                <div class="leaderboard">
                            <h2>Leaderboard</h2>
                            <div id="leaderboardContent"></div>div>
                </div>div>
        </div>div>
  
      <script>
                const nhlTeams = [
                              'Anaheim Ducks', 'Arizona Coyotes', 'Boston Bruins', 'Buffalo Sabres',
                              'Calgary Flames', 'Carolina Hurricanes', 'Chicago Blackhawks', 'Colorado Avalanche',
                              'Columbus Blue Jackets', 'Dallas Stars', 'Detroit Red Wings', 'Edmonton Oilers',
                              'Florida Panthers', 'Los Angeles Kings', 'Minnesota Wild', 'Montreal Canadiens',
                              'Nashville Predators', 'New Jersey Devils', 'New York Islanders', 'New York Rangers',
                              'Ottawa Senators', 'Philadelphia Flyers', 'Pittsburgh Penguins', 'San Jose Sharks',
                              'Seattle Kraken', 'St. Louis Blues', 'Tampa Bay Lightning', 'Toronto Maple Leafs',
                              'Vancouver Canucks', 'Vegas Golden Knights', 'Washington Capitals', 'Winnipeg Jets'
                          ];

                let players = JSON.parse(localStorage.getItem('tlPlayers')) || [];
                let drafts = JSON.parse(localStorage.getItem('tlDrafts')) || [];

                function initializeTeamSelect() {
                              const select = document.getElementById('teamSelect');
                              select.innerHTML = '<option value="">Select an NHL team...</option>';
                              const draftedTeams = drafts.map(d => d.team);
                              nhlTeams.forEach(team => {
                                                if (!draftedTeams.includes(team)) {
                                                                      const option = document.createElement('option');
                                                                      option.value = team;
                                                                      option.textContent = team;
                                                                      select.appendChild(option);
                                                }
                              });
                }

                function initializePlayerSelects() {
                              const selects = [
                                                document.getElementById('playerSelect'),
                                                document.getElementById('updatePlayerSelect')
                                            ];

                              selects.forEach(select => {
                                                const currentValue = select.value;
                                                select.innerHTML = '<option value="">Select a player...</option>';
                                                players.forEach(player => {
                                                                      const option = document.createElement('option');
                                                                      option.value = player.id;
                                                                      option.textContent = player.name;
                                                                      select.appendChild(option);
                                                });
                                                select.value = currentValue;
                              });
                }

                function addPlayer() {
                              const name = document.getElementById('playerName').value.trim();
                              if (!name) {
                                                alert('Please enter a player name');
                                                return;
                              }

                              const newPlayer = {
                                                id: Date.now().toString(),
                                                name: name
                              };

                              players.push(newPlayer);
                              localStorage.setItem('tlPlayers', JSON.stringify(players));
                              document.getElementById('playerName').value = '';
                              initializePlayerSelects();
                              renderLeaderboard();
                }

                function draftTeam() {
                              const playerId = document.getElementById('playerSelect').value;
                              const team = document.getElementById('teamSelect').value;

                              if (!playerId || !team) {
                                                alert('Please select both a player and a team');
                                                return;
                              }

                              if (drafts.some(d => d.team === team)) {
                                                alert('This team has already been drafted!');
                                                return;
                              }

                              if (drafts.some(d => d.playerId === playerId)) {
                                                alert('This player has already drafted a team!');
                                                return;
                              }

                              const draft = {
                                                id: Date.now().toString(),
                                                playerId: playerId,
                                                team: team,
                                                wins: 0
                              };

                              drafts.push(draft);
                              localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                              document.getElementById('playerSelect').value = '';
                              document.getElementById('teamSelect').value = '';
                              initializeTeamSelect();
                              renderLeaderboard();
                }

                function updateWins() {
                              const playerId = document.getElementById('updatePlayerSelect').value;
                              const wins = parseInt(document.getElementById('winsInput').value);

                              if (!playerId || isNaN(wins) || wins < 0) {
                                                alert('Please select a player and enter valid wins');
                                                return;
                              }

                              const draft = drafts.find(d => d.playerId === playerId);
                              if (draft) {
                                                draft.wins = wins;
                                                localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                                                renderLeaderboard();
                              }
                }

                function removeDraft(draftId) {
                              if (confirm('Remove this draft?')) {
                                                drafts = drafts.filter(d => d.id !== draftId);
                                                localStorage.setItem('tlDrafts', JSON.stringify(drafts));
                                                initializeTeamSelect();
                                                renderLeaderboard();
                              }
                }

                function renderLeaderboard() {
                              const content = document.getElementById('leaderboardContent');

                              if (drafts.length === 0) {
                                                content.innerHTML = '<div class="no-data">No drafts yet. Start by adding players and drafting teams!</div>';
                                                return;
                              }

                              const leaderboardData = drafts.map(draft => {
                                                const player = players.find(p => p.id === draft.playerId);
                                                return {
                                                                      ...draft,
                                                                      playerName: player ? player.name : 'Unknown'
                                                };
                              }).sort((a, b) => b.wins - a.wins);

                              let html = '<table><thead><tr><th>Rank</th><th>Player</th><th>Team</th><th>Wins</th><th>Action</th></tr></thead><tbody>';

                              leaderboardData.forEach((item, index) => {
                                                const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : '';
                                                html += `
                                                                    <tr>
                                                                                            <td class="rank ${rankClass}">${index + 1}</td>
                                                                                                                    <td>${item.playerName}</td>
                                                                                                                                            <td>${item.team}</td>
                                                                                                                                                                    <td class="wins">${item.wins}</td>
                                                                                                                                                                                            <td><button class="delete-btn" onclick="removeDraft('${item.id}')">Remove</button></td>
                                                                                                                                                                                                                </tr>
                                                                                                                                                                                                                                `;
                              });

                              html += '</tbody></table>';
                              content.innerHTML = html;
                }

                window.addEventListener('load', function() {
                              initializePlayerSelects();
                              initializeTeamSelect();
                              renderLeaderboard();
                });
      </script>
  </body>
</html>html>
      </script></h2></h1>
                  </header>
  </body>
      </style></title>
  </head>
